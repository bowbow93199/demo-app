apiVersion: batch/v1
kind: Job
metadata:
  name: movies-seed-job
  namespace: default
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: movies-seed-job
    spec:
      restartPolicy: Never
      containers:
        - name: movies-seed
          image: us-central1-docker.pkg.dev/gke-free-lab/demo-app-repo/backend:latest
          command: ["npm", "run", "seed"]
          env:
            - name: MONGO_HOST
              value: "mongodb"
            - name: MONGO_PORT
              value: "27017"
            - name: MONGO_DB
              value: "moviesdb"
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongo-app-username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongo-app-password
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
              ephemeral-storage: "1Gi"
